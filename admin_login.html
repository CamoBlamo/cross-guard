<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GCPS Crossing Guard Management | Admin Login</title>
    <link rel="stylesheet" href="admin_login-style.css">
    <link rel="icon" type="image/jpg" href="icons/gcps-1000x600.jpg">
</head>
<body>
    <h1 class="admin-login-title">Administrator Login</h1>
    <form action="admin_dashboard.html" method="post" class="admin-login-form">
        <label for="username">Username:</label>
        <input type="text" id="username" name="username" required>

        <label for="password">Password:</label>
        <input type="password" id="password" name="password" required>

        <button type="submit">Log In</button>
    </form>

    <script src="admin_login.js"></script>
</body>
</html>
