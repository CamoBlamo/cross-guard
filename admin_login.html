<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GCPS Crossing Guard Management | Admin Login</title>
    <link rel="stylesheet" href="admin_login-style.css">
    <link rel="icon" type="image/jpg" href="icons/gcps-1000x600.jpg">
</head>
<body>
    <div class="login-container">
        <div class="login-header">
            <h1 class="admin-login-title">Administrator Login</h1>
            <p class="login-subtitle">GCPS Crossing Guard Management System</p>
        </div>
        <form id="adminLoginForm" class="admin-login-form">
            <div class="form-group">
                <label for="adminUsername">Username:</label>
                <input type="text" id="adminUsername" name="username" required>
            </div>

            <div class="form-group">
                <label for="adminPassword">Password:</label>
                <input type="password" id="adminPassword" name="password" required>
            </div>

            <button type="submit" class="login-btn">Log In</button>
        </form>
        <div class="super-admin-link">
            <a href="super_admin_login.html">Super Administrator Access</a>
        </div>
    </div>

    <script src="admin_login.js"></script>
</body>
</html>
