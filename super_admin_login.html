<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GCPS Crossing Guard | Super Admin Login</title>
    <link rel="stylesheet" href="admin_login-style.css">
    <link rel="icon" type="image/jpg" href="icons/gcps-1000x600.jpg">
</head>
<body>
    <div class="login-container">
        <div class="login-header">
            <h1 class="admin-login-title">Super Administrator Login</h1>
            <p class="login-subtitle">System Control Panel</p>
        </div>
        <form id="superAdminLoginForm" class="admin-login-form">
            <div class="form-group">
                <label for="superAdminUsername">Username:</label>
                <input type="text" id="superAdminUsername" name="username" required autocomplete="username">
            </div>

            <div class="form-group">
                <label for="superAdminPassword">Password:</label>
                <input type="password" id="superAdminPassword" name="password" required autocomplete="current-password">
            </div>

            <button type="submit" class="login-btn">Log In</button>
        </form>
        <div class="super-admin-link">
            <a href="admin_login.html">← Back to Regular Admin Login</a>
        </div>
    </div>

    <script src="super_admin_login.js"></script>
</body>
</html>
