<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Crossing Guard Management | Log In</title>
    <link rel="stylesheet" href="guard_login-style.css">
    <link rel="icon" type="image/jpg" href="icons/gcps-1000x600.jpg">
</head>
<body>
    <div class="login-container">
        <div class="login-header">
            <h1>Crossing Guard Login</h1>
            <p class="login-subtitle">GCPS Crossing Guard Management System</p>
        </div>
        <form class="login-form">
            <div class="form-group">
                <label for="username">Username:</label>
                <input type="text" id="username" name="username" required>
            </div>

            <button type="submit" class="login-btn">Log In</button>
        </form>
    </div>

    <script src="guard_login.js"></script>
</body>
</html>
